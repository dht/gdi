id: InboxMultiBar
header: Inbox
initialViewMode: table
viewModes:
    - table
hideParts:
    - filter
    - tools
    - tagging
    - search
    - buttons
    - preview
tools:
    - id: select
      text: Select
      iconName: BorderDot
      options:
          - id: none
            text: None
            iconName: LocationCircle
          - id: single
            text: Single
            iconName: BorderDot
          - id: multiple
            text: Multiple
            iconName: TripleColumn
    - id: edit
      text: Edit
      iconName: Edit
    - id: delete
      text: Delete
      iconName: Delete
toolbarMode: select
doubleClickActionId: drillDown
